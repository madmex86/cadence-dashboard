<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence Creatures — Messages</title>
<link rel="icon" href="/favicon.ico?v=2"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
  .msg-grid { display: flex; flex-direction: column; gap: 12px; }
  .msg-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(201,168,76,0.12); border-radius: 6px; padding: 20px; transition: border-color .2s; cursor: pointer; }
  .msg-card:hover { border-color: rgba(201,168,76,0.3); }
  .msg-card.unread { border-left: 3px solid var(--gold); background: rgba(201,168,76,0.03); }
  .msg-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .msg-topic { font-size: 9px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 4px; }
  .msg-sender { font-family: 'Lora', serif; font-size: 15px; color: var(--cream); }
  .msg-date { font-size: 10px; color: var(--dim); }
  .msg-body { font-size: 12px; line-height: 1.6; color: var(--cream-dim); margin-top: 10px; white-space: pre-wrap; }
  .msg-order { font-size: 10px; color: #5BBFD4; margin-top: 8px; font-weight: 500; }
  .msg-actions { margin-top: 16px; display: flex; gap: 10px; border-top: 1px solid rgba(201,168,76,0.08); padding-top: 14px; }
</style>
</head>
<body>
<div id="login-screen" style="display:none"></div>
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <svg width="22" height="17" viewBox="0 -2 76 52" fill="none" style="filter:drop-shadow(0 0 5px rgba(201,168,76,.35))"><path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/><rect x="4" y="42" width="64" height="3" rx="1.5" fill="#C9A84C"/><circle cx="36" cy="4" r="5.5" fill="#E8D08A"/><circle cx="6" cy="18" r="4" fill="#5BBFD4"/><circle cx="66" cy="18" r="4" fill="#5BBFD4"/></svg>
      <div><div class="topbar-name">Cadence Creatures</div><div class="topbar-sub">Back Office</div></div>
    </div>
    <div class="topbar-right"><div id="user-greet"></div><a class="topbar-link" onclick="signOut()">Sign Out</a></div>
  </div>
  <div class="dash-nav">
    <a href="index.html">Hub</a>
    <a href="cadence-queue.html">Queue</a>
    <a href="cadence-fulfillment.html">Fulfillment</a>
    <a href="cadence-customers.html">Customers</a>
    <a href="cadence-messages.html">Messages</a>
    <a href="cadence-messages.html">Messages</a>
    <a href="cadence-creature-editor.html">Creatures</a>
    <a href="cadence-email-blast.html">Email Blast</a>
    <a href="cadence-drop-launch.html">🚀 Launch</a>
    <a href="cadence-creatures-pl-tracker.html">P&amp;L</a>
    <a href="cadence-links.html">Links</a>
    <a href="cadence-activity.html">Activity</a>
    <a href="cadence-admin.html">Admin</a>
    <a href="cadence-site.html">Site</a>
    <a href="https://cadencecreatures.com" target="_blank">Live Site ↗</a>
    <a href="https://etsy.com/shop/CadenceCreatures" target="_blank">Etsy Shop ↗</a>
  </div>
  <div class="main">
    <div class="main-content">
      <div class="header">
        <div class="title">Workshop Inquiries</div>
        <div class="subtitle">Direct messages from the workshop contact form.</div>
      </div>

      <div class="msg-grid" id="msg-list">
        <div style="color:var(--dim);font-size:12px;padding:40px;text-align:center;letter-spacing:.12em;text-transform:uppercase;">Loading messages…</div>
      </div>
    </div>
  </div>
</div>

<script>
let _messages = [];

async function loadMessages() {
  const { data, error } = await db.from('contact_submissions').select('*').order('created_at', { ascending: false });
  if (error) { console.error('Load failed:', error); return; }
  _messages = data || [];
  renderMessages();
}

function renderMessages() {
  const list = document.getElementById('msg-list');
  if (!_messages.length) {
    list.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:40px;text-align:center;letter-spacing:.12em;text-transform:uppercase;">No messages found.</div>';
    return;
  }

  list.innerHTML = _messages.map(m => {
    const date = new Date(m.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="msg-card ${m.is_read ? '' : 'unread'}" onclick="markAsRead('${m.id}')">
        <div class="msg-topic">${m.topic || 'General Inquiry'}</div>
        <div class="msg-hdr">
          <div class="msg-sender">${m.name} <span style="font-size:11px; color:var(--dim); font-family:sans-serif;">&lt;${m.email}&gt;</span></div>
          <div class="msg-date">${date}</div>
        </div>
        ${m.order_number ? `<div class="msg-order">Order: ${m.order_number}</div>` : ''}
        <div class="msg-body">${m.message}</div>
        <div class="msg-actions">
          <button class="btn sm" onclick="event.stopPropagation(); markAsRead('${m.id}', true)">${m.is_read ? 'Mark Unread' : 'Mark as Read'}</button>
          <a href="mailto:${m.email}" class="btn sm pri" onclick="event.stopPropagation()">Reply</a>
        </div>
      </div>
    `;
  }).join('');
}

async function markAsRead(id, toggle = false) {
  const msg = _messages.find(m => m.id === id);
  if (!msg) return;
  const newState = toggle ? !msg.is_read : true;
  if (msg.is_read === newState) return;

  const { error } = await db.from('contact_submissions').update({ is_read: newState }).eq('id', id);
  if (error) { toast('Update failed', 'err'); return; }
  
  msg.is_read = newState;
  renderMessages();
  refreshMessageBadge();
}

async function showApp() {
  document.getElementById('app').style.display = 'block';
  await loadMessages();
}
</script>
</body>
</html>
