[build]
  command = "echo 'No build step required'"
  publish = "."

[[redirects]]
  from = "/queue"
  to = "/cadence-queue.html"
  status = 200

[[redirects]]
  from = "/pl"
  to = "/cadence-creatures-pl-tracker.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store, no-cache"
