<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence Creatures — Sales Intelligence</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
<script src="shared.js"></script>
<style>
  canvas { max-height: 320px !important; }

  .kpi-grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .kpi-card  { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 4px; padding: 20px; text-align: center; }
  .kpi-label { font-size: 9px; letter-spacing: .15em; text-transform: uppercase; color: var(--cream-faint); margin-bottom: 8px; }
  .kpi-val   { font-size: 22px; font-weight: 600; color: var(--amber); }
  .kpi-sub   { font-size: 10px; color: var(--cream-faint); margin-top: 6px; }

  .section-title { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: rgba(201,168,76,.6); margin: 28px 0 14px; }

  .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .chart-wrap { background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }

  .rank-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .rank-table th { font-size: 8px; letter-spacing: .15em; text-transform: uppercase; color: var(--cream-faint); padding: 0 0 10px; text-align: left; font-weight: 400; }
  .rank-table th:last-child, .rank-table td:last-child { text-align: right; }
  .rank-table td { padding: 9px 0; border-bottom: 1px solid rgba(201,168,76,.06); color: var(--cream); }
  .rank-table tr:last-child td { border-bottom: none; }

  .trending-badge { display: inline-block; padding: 2px 6px; border-radius: 2px; font-size: 9px; font-weight: 600; letter-spacing: .05em; background: rgba(125,201,148,.15); color: #7dc994; margin-left: 6px; }

  .bar-bg   { background: rgba(255,255,255,.05); border-radius: 2px; height: 4px; width: 80px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--amber); }

  .queue-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .queue-card { background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 4px; padding: 16px; }
  .queue-rank { font-size: 22px; font-weight: 700; color: rgba(201,168,76,.2); line-height: 1; margin-bottom: 8px; }
  .queue-name { font-size: 13px; font-weight: 500; color: var(--cream); margin-bottom: 10px; }
  .queue-row  { display: flex; justify-content: space-between; font-size: 11px; color: var(--cream-faint); padding: 3px 0; }
  .queue-row span:last-child { color: var(--cream); font-weight: 500; }
  .queue-urgent { border-color: rgba(224,144,144,.3) !important; }
  .queue-urgent .queue-rank { color: rgba(224,144,144,.35); }

  @media (max-width: 768px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .two-col  { grid-template-columns: 1fr; }
    .queue-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="login-screen" style="display:none"></div>
<div id="app" style="display:none">

<div class="topbar">
  <div class="topbar-left">
    <svg width="22" height="17" viewBox="0 -2 76 52" fill="none" style="filter:drop-shadow(0 0 5px rgba(201,168,76,.35))"><path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/><rect x="4" y="42" width="64" height="3" rx="1.5" fill="#C9A84C"/><circle cx="36" cy="4" r="5.5" fill="#E8D08A"/><circle cx="6" cy="18" r="4" fill="#5BBFD4"/><circle cx="66" cy="18" r="4" fill="#5BBFD4"/></svg>
    <div><div class="topbar-name">Cadence Creatures</div><div class="topbar-sub">Back Office</div></div>
  </div>
  <div class="topbar-right">
    <div id="user-greet"></div>
    <a class="topbar-link" onclick="signOut()">Sign Out</a>
  </div>
</div>
<div class="dash-nav"></div>

<div class="content">

  <!-- KPI ROW -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Orders</div>
      <div class="kpi-val" id="kpi-total-orders">—</div>
      <div class="kpi-sub">All time</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">This Week</div>
      <div class="kpi-val" id="kpi-week-orders">—</div>
      <div class="kpi-sub" id="kpi-week-delta"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Top Seller</div>
      <div class="kpi-val" id="kpi-top-seller" style="font-size:15px;line-height:1.3">—</div>
      <div class="kpi-sub" id="kpi-top-count"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Trending This Week</div>
      <div class="kpi-val" id="kpi-trending" style="font-size:15px;line-height:1.3">—</div>
      <div class="kpi-sub" id="kpi-trending-pct"></div>
    </div>
  </div>

  <!-- DAILY REVENUE LINE CHART -->
  <div class="section-title">Daily Revenue — Last 30 Days</div>
  <div class="chart-wrap" style="margin-bottom:20px">
    <canvas id="revenue-chart"></canvas>
  </div>

  <!-- CATEGORY SPLIT + TOP CREATURES -->
  <div class="section-title">Creature Performance</div>
  <div class="two-col">
    <div class="chart-wrap">
      <div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--cream-faint);margin-bottom:16px">Sales by Creature</div>
      <canvas id="split-chart" style="max-height:220px !important"></canvas>
    </div>
    <div class="chart-wrap">
      <div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--cream-faint);margin-bottom:14px">Ranked by Units Sold</div>
      <table class="rank-table">
        <thead><tr><th>#</th><th>Creature</th><th>Units</th><th>Share</th></tr></thead>
        <tbody id="rank-tb"><tr><td colspan="4" style="color:var(--cream-faint)">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- PRINTER QUEUE RECOMMENDATIONS -->
  <div class="section-title">Printer Queue Recommendations <span style="font-size:9px;color:var(--cream-faint);letter-spacing:.05em;text-transform:none;font-family:sans-serif">— top 5 by demand vs stock</span></div>
  <div class="queue-grid" id="queue-grid">
    <div class="queue-card" style="color:var(--cream-faint);font-size:12px">Loading…</div>
  </div>

</div>
</div>

<script>
let orders = [], creatures = [], fin = [];
let revChart, splitChart;

function fmt$(v){ return '$'+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── Flatten order items ──────────────────────────────────────────────────────
function getItems(o) {
  if (!o.items) return [];
  if (Array.isArray(o.items)) return o.items.map(i => (typeof i === 'string' ? i : i.name || i.title || '').trim()).filter(Boolean);
  if (typeof o.items === 'string') {
    try { const p = JSON.parse(o.items); return Array.isArray(p) ? p.map(i => (typeof i === 'string' ? i : i.name || i.title || '').trim()).filter(Boolean) : [o.items]; }
    catch { return [o.items]; }
  }
  return [];
}

// ── Date helpers ─────────────────────────────────────────────────────────────
function startOfDay(d){ const r=new Date(d); r.setHours(0,0,0,0); return r; }
function startOfWeek(d){ const r=startOfDay(d); r.setDate(r.getDate()-r.getDay()); return r; }

function ordersInRange(start, end) {
  return orders.filter(o => {
    const d = new Date(o.order_date || o.created_at);
    return d >= start && d <= end;
  });
}

// ── Creature sales map: { name → count } ────────────────────────────────────
function buildSalesMap(orderSet) {
  const map = {};
  orderSet.forEach(o => getItems(o).forEach(name => {
    map[name] = (map[name] || 0) + 1;
  }));
  return map;
}

// ── KPIs ─────────────────────────────────────────────────────────────────────
function updateKPIs() {
  const now = new Date();
  const weekStart = startOfWeek(now);
  const lastWeekStart = new Date(weekStart); lastWeekStart.setDate(lastWeekStart.getDate()-7);
  const lastWeekEnd   = new Date(weekStart); lastWeekEnd.setMilliseconds(-1);

  const thisWeekOrders = ordersInRange(weekStart, now);
  const lastWeekOrders = ordersInRange(lastWeekStart, lastWeekEnd);
  const thisWeekMap    = buildSalesMap(thisWeekOrders);
  const lastWeekMap    = buildSalesMap(lastWeekOrders);

  document.getElementById('kpi-total-orders').textContent = orders.length;

  // Week orders + delta
  const wc = thisWeekOrders.length, lwc = lastWeekOrders.length;
  document.getElementById('kpi-week-orders').textContent = wc;
  const deltaEl = document.getElementById('kpi-week-delta');
  if (lwc === 0 && wc > 0) { deltaEl.innerHTML = '<span style="color:#7dc994;font-weight:600">New ↑</span> vs last week'; }
  else if (lwc > 0) {
    const pct = Math.round((wc-lwc)/lwc*100);
    deltaEl.innerHTML = `<span style="color:${pct>=0?'#7dc994':'#e09090'};font-weight:600">${pct>=0?'+':''}${pct}% ${pct>=0?'↑':'↓'}</span> vs last week`;
  } else { deltaEl.textContent = 'vs last week'; }

  // Top seller (all time)
  const allMap = buildSalesMap(orders);
  const sorted = Object.entries(allMap).sort((a,b)=>b[1]-a[1]);
  if (sorted.length) {
    document.getElementById('kpi-top-seller').textContent = sorted[0][0];
    document.getElementById('kpi-top-count').textContent  = sorted[0][1] + ' units sold';
  }

  // Trending: highest week-over-week % increase (min 2 units this week)
  let trendName = null, trendPct = 0;
  Object.entries(thisWeekMap).forEach(([name, cnt]) => {
    if (cnt < 2) return;
    const prev = lastWeekMap[name] || 0;
    const pct  = prev === 0 ? 100 : Math.round((cnt-prev)/prev*100);
    if (pct > trendPct) { trendPct = pct; trendName = name; }
  });
  if (trendName && trendPct >= 20) {
    document.getElementById('kpi-trending').textContent    = trendName;
    document.getElementById('kpi-trending-pct').innerHTML  = `<span style="color:#7dc994;font-weight:600">+${trendPct}%</span> week-over-week`;
  } else {
    document.getElementById('kpi-trending').textContent   = '—';
    document.getElementById('kpi-trending-pct').textContent = 'No significant trend';
  }
}

// ── Revenue line chart ───────────────────────────────────────────────────────
function renderRevenueChart() {
  const ctx = document.getElementById('revenue-chart').getContext('2d');
  const today = new Date(); today.setHours(0,0,0,0);
  const dataMap = {};
  for (let i=29;i>=0;i--) { const d=new Date(today); d.setDate(d.getDate()-i); dataMap[d.toISOString().slice(0,10)]=0; }
  fin.filter(f=>f.entry_type==='income').forEach(f => {
    const dt = (f.entry_date||'').slice(0,10);
    if (dt in dataMap) dataMap[dt] += parseFloat(f.amount)||0;
  });
  const labels  = Object.keys(dataMap).map(d=>d.slice(5).replace('-','/'));
  const revData = Object.values(dataMap);
  if (revChart) revChart.destroy();
  Chart.defaults.color = '#8A7D6E';
  Chart.defaults.font.family = "'Segoe UI', sans-serif";
  revChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ label: 'Revenue', data: revData, borderColor: '#C9A84C', backgroundColor: 'rgba(201,168,76,0.08)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#C9A84C' }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{ grid:{color:'rgba(255,255,255,0.04)'}, border:{display:false}, ticks:{callback:v=>'$'+v} }, x:{ grid:{display:false}, border:{display:false}, ticks:{maxTicksLimit:10} } } }
  });
}

// ── Category split donut ─────────────────────────────────────────────────────
function renderSplitChart() {
  const ctx  = document.getElementById('split-chart').getContext('2d');
  const map  = buildSalesMap(orders);
  const top5 = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const rest = Object.entries(map).slice(5).reduce((s,[,v])=>s+v,0);
  const labels = top5.map(([k])=>k);
  const data   = top5.map(([,v])=>v);
  if (rest > 0) { labels.push('Other'); data.push(rest); }
  const colors = ['rgba(201,168,76,0.75)','rgba(91,191,212,0.75)','rgba(125,201,148,0.75)','rgba(184,157,232,0.75)','rgba(232,160,176,0.75)','rgba(120,100,80,0.5)'];
  if (splitChart) splitChart.destroy();
  splitChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets:[{ data, backgroundColor:colors, borderColor:colors.map(c=>c.replace('.75)','.9)').replace('.5)','.7)')), borderWidth:1 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:true, position:'bottom', labels:{ boxWidth:10, font:{size:10}, color:'#8A7D6E', padding:12 } } } }
  });
}

// ── Ranked table ─────────────────────────────────────────────────────────────
function renderRankTable() {
  const now = new Date();
  const weekStart     = startOfWeek(now);
  const lastWeekStart = new Date(weekStart); lastWeekStart.setDate(lastWeekStart.getDate()-7);
  const lastWeekEnd   = new Date(weekStart); lastWeekEnd.setMilliseconds(-1);
  const thisWeekMap   = buildSalesMap(ordersInRange(weekStart, now));
  const lastWeekMap   = buildSalesMap(ordersInRange(lastWeekStart, lastWeekEnd));

  const map    = buildSalesMap(orders);
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const total  = sorted.reduce((s,[,v])=>s+v,0);
  const tb     = document.getElementById('rank-tb');
  if (!sorted.length) { tb.innerHTML='<tr><td colspan="4" style="color:var(--cream-faint)">No order items yet.</td></tr>'; return; }

  tb.innerHTML = sorted.slice(0,10).map(([name,cnt],i) => {
    const pct   = total > 0 ? Math.round(cnt/total*100) : 0;
    const curW  = thisWeekMap[name] || 0;
    const prevW = lastWeekMap[name] || 0;
    const trending = curW >= 2 && prevW > 0 && Math.round((curW-prevW)/prevW*100) >= 20;
    const trendingNew = curW >= 2 && prevW === 0;
    const badge = (trending||trendingNew) ? `<span class="trending-badge">↑ Trending</span>` : '';
    return `<tr>
      <td style="color:var(--cream-faint)">${i+1}</td>
      <td>${name}${badge}</td>
      <td style="font-weight:500;color:var(--amber)">${cnt}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div><span style="font-size:10px;color:var(--cream-faint);margin-left:6px">${pct}%</span></td>
    </tr>`;
  }).join('');
}

// ── Printer queue recommendations ────────────────────────────────────────────
function renderQueueRecs() {
  const grid = document.getElementById('queue-grid');
  if (!creatures.length) { grid.innerHTML = '<div class="queue-card" style="color:var(--cream-faint);font-size:12px">No creature data available.</div>'; return; }

  const now           = new Date();
  const weekStart     = startOfWeek(now);
  const lastWeekStart = new Date(weekStart); lastWeekStart.setDate(lastWeekStart.getDate()-7);
  const lastWeekEnd   = new Date(weekStart); lastWeekEnd.setMilliseconds(-1);
  const recentMap     = buildSalesMap(ordersInRange(lastWeekStart, now));
  const allMap        = buildSalesMap(orders);

  // Score = (sales last 14 days) / max(qty_on_hand, 1) — high demand + low stock = high score
  const scored = creatures
    .filter(c => c.active !== false)
    .map(c => {
      const stock    = Number(c.qty_on_hand || c.inventory_count || 0);
      const velocity = recentMap[c.name] || 0;
      const total    = allMap[c.name]    || 0;
      const score    = (velocity + 1) / Math.max(stock, 1);
      return { ...c, stock, velocity, total, score };
    })
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  if (!scored.length) { grid.innerHTML = '<div class="queue-card" style="color:var(--cream-faint);font-size:12px">No creatures found.</div>'; return; }

  grid.innerHTML = scored.map((c, i) => {
    const urgent = c.stock === 0;
    return `<div class="queue-card${urgent?' queue-urgent':''}">
      <div class="queue-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="queue-name">${c.name}${urgent?` <span style="font-size:9px;color:#e09090;font-weight:600">OUT</span>`:''}</div>
      <div class="queue-row"><span>In stock</span><span style="color:${c.stock===0?'#e09090':c.stock<=2?'#E8D08A':'#7dc994'}">${c.stock} units</span></div>
      <div class="queue-row"><span>Sold (2 wks)</span><span>${c.velocity}</span></div>
      <div class="queue-row"><span>Total sold</span><span>${c.total}</span></div>
    </div>`;
  }).join('');
}

// ── Load all data ────────────────────────────────────────────────────────────
async function loadData() {
  const [{ data: od }, { data: cd }, { data: fd }] = await Promise.all([
    db.from('orders').select('id,order_date,created_at,items,total_amount,status'),
    db.from('creatures').select('id,name,species,qty_on_hand,inventory_count,active,etsy_url'),
    db.from('finance').select('entry_type,amount,entry_date').eq('entry_type','income')
  ]);
  orders   = od || [];
  creatures = cd || [];
  fin      = fd || [];

  updateKPIs();
  renderRevenueChart();
  renderSplitChart();
  renderRankTable();
  renderQueueRecs();
}

function showApp() {
  document.getElementById('app').style.display = 'block';
  loadData();
}

db.channel('sales-rt')
  .on('postgres_changes',{event:'*',schema:'public',table:'orders'},   ()=>loadData())
  .on('postgres_changes',{event:'*',schema:'public',table:'creatures'}, ()=>loadData())
  .on('postgres_changes',{event:'*',schema:'public',table:'finance'},   ()=>loadData())
  .subscribe();
</script>
</div>
</body>
</html>
