<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence Forge | Fulfillment Board</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="shared.js"></script>
<style>
  :root {
    --bg: #0a0f1e;
    --panel-bg: #11192d;
    --border: rgba(201, 168, 76, 0.15);
    --gold: #C9A84C;
    --gold-light: #E8D08A;
    --cream: #f4eee0;
    --cream-dim: #c5bba8;
    --cream-faint: rgba(197, 187, 168, 0.5);
    --cyan: #5BBFD4;
    --green: #7dc994;
  }

  body { margin: 0; padding: 0; background: var(--bg); color: var(--cream); font-family: 'Lora', serif; overflow-x: hidden; }

  /* Fixed Sidebar Navigation */
  .dash-nav {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 240px; background: #0d1425;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 80px 0 20px 0; z-index: 50;
  }
  .dash-nav a { padding: 12px 28px; font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--cream-faint); text-decoration: none; transition: 0.2s; }
  .dash-nav a:hover { color: var(--gold-light); background: rgba(255,255,255,0.03); }

  /* Topbar */
  .topbar { 
    position: fixed; top: 0; right: 0; left: 0; height: 60px;
    background: rgba(13, 20, 37, 0.95); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 30px; border-bottom: 1px solid var(--border); z-index: 100;
  }

  /* Main Offset Content */
  #app { margin-left: 240px; display: flex; flex-direction: column; min-height: 100vh; }
  .content { padding: 100px 30px 40px 30px; flex: 1; display: flex; flex-direction: column; }

  /* Board & Column Styling */
  .board { display: flex; gap: 20px; overflow-x: auto; flex: 1; padding-bottom: 20px; }
  .col { 
    flex: 0 0 320px; display: flex; flex-direction: column; 
    background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); 
    border-radius: 8px; overflow: hidden; 
  }
  .col-header { 
    padding: 16px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); 
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); 
    display: flex; justify-content: space-between; align-items: center; 
  }
  .col-count { background: rgba(201, 168, 76, 0.15); color: var(--gold-light); font-size: 9px; padding: 2px 8px; border-radius: 4px; }
  .col-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 300px; }

  /* Card Styling */
  .card { 
    background: var(--panel-bg); border: 1px solid var(--border); 
    border-radius: 6px; padding: 16px; display: flex; flex-direction: column; gap: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.1s; 
  }
  .card-id { font-size: 13px; font-weight: 700; color: var(--gold-light); }
  .card-buyer { font-size: 11px; color: var(--cream-faint); margin-top: 2px; }
  
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .chk-item { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; cursor: pointer; padding: 4px 0; }
  .chk-box { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 3px; flex-shrink: 0; }
  .chk-item.done .chk-box { background: var(--gold); }
  .chk-item.done span { text-decoration: line-through; opacity: 0.4; }

  @media (max-width: 1024px) { 
    .dash-nav { display: none; } 
    #app { margin-left: 0; } 
    .board { flex-direction: column; }
    .col { flex: 1 0 auto; width: 100%; }
  }
</style>
</head>
<body>

<div id="login-screen" style="display:none"></div>

<div id="app">
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <svg width="24" height="24" viewBox="0 0 76 52" fill="none"><path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" stroke="#C9A84C" stroke-width="3"/></svg>
      <div style="font-weight:bold; letter-spacing:0.1em; text-transform:uppercase;">Shipment Forge</div>
    </div>
    <div id="user-greet" style="font-size:12px; color:var(--cream-dim)"></div>
  </div>

  <div class="dash-nav">
    <a href="index.html">Hub Dashboard</a>
    <a href="cadence-queue.html">Operational Queue</a>
    <a href="cadence-fulfillment.html" style="color:var(--gold)">Fulfillment Board</a>
    <a href="cadence-creatures-pl-tracker.html">P&amp;L Analysis</a>
    <a href="cadence-activity.html">System Activity</a>
    <a href="https://cadencecreatures.com" target="_blank">Live Site ↗</a>
  </div>

  <div class="content">
    <div class="header" style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 30px;">
      <div>
        <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 8px;">Order Logistics</p>
        <h1 style="margin: 0; font-size: 32px; font-weight: bold;">Fulfillment Pipeline</h1>
      </div>
      <div style="display:flex; gap:12px;">
        <button class="btn" onclick="toggleBulkMode()">⚡ Batch Actions</button>
        <button class="btn" onclick="printPullList()">🖨 Print Packing Slip</button>
      </div>
    </div>

    <div class="board">
      <div class="col" id="col-queued">
        <div class="col-header"><span>Queued</span><span class="col-count" id="cnt-queued">0</span></div>
        <div class="col-body" id="list-queued"></div>
      </div>
      <div class="col" id="col-printing">
        <div class="col-header"><span>Printing</span><span class="col-count" id="cnt-printing">0</span></div>
        <div class="col-body" id="list-printing"></div>
      </div>
      <div class="col" id="col-printed">
        <div class="col-header"><span>Printed</span><span class="col-count" id="cnt-printed">0</span></div>
        <div class="col-body" id="list-printed"></div>
      </div>
      <div class="col" id="col-packaging">
        <div class="col-header"><span>Packaging</span><span class="col-count" id="cnt-packaging">0</span></div>
        <div class="col-body" id="list-packaging"></div>
      </div>
      <div class="col" id="col-shipped">
        <div class="col-header"><span>Shipped</span><span class="col-count" id="cnt-shipped">0</span></div>
        <div class="col-body" id="list-shipped"></div>
      </div>
    </div>
  </div>
