<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence Creatures — Creature Editor</title>
<link rel="icon" href="/favicon.ico?v=2"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
  .editor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  .creature-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(201,168,76,0.12); border-radius: 6px; overflow: hidden; transition: border-color .2s; }
  .creature-card:hover { border-color: rgba(201,168,76,0.28); }
  .card-img { width: 100%; height: 180px; object-fit: cover; display: block; background: rgba(0,0,0,0.3); }
  .card-img-placeholder { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: rgba(201,168,76,0.04); color: rgba(201,168,76,0.2); font-size: 11px; letter-spacing: .15em; text-transform: uppercase; }
  .card-body { padding: 16px; }
  .card-name { font-family: 'Lora', serif; font-size: 17px; color: var(--cream); margin-bottom: 3px; }
  .card-meta { font-size: 10px; color: var(--dim); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px; }
  .toggle-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .tog { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); cursor: pointer; padding: 5px 10px; border: 1px solid rgba(201,168,76,0.15); border-radius: 3px; transition: all .2s; user-select: none; }
  .tog.on { color: var(--goldl); border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.08); }
  .tog.on.green { color: #7dc994; border-color: rgba(125,201,148,0.5); background: rgba(125,201,148,0.07); }
  .tog.on.teal  { color: var(--teal); border-color: rgba(91,191,212,0.5); background: rgba(91,191,212,0.07); }
  .tog-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .card-actions { display: flex; gap: 6px; }
  .stock-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .stock-val { font-family: 'Lora', serif; font-size: 18px; color: var(--goldl); min-width: 28px; text-align: center; }
  .stock-lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .1em; }

  /* Modal */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(6px); z-index:1100; align-items:flex-start; justify-content:center; padding:24px 20px 40px; overflow-y:auto; }
  .modal-bg.open { display:flex; }
  .modal-box { background: var(--ink); border: 1px solid var(--gold-light); width: 95%; max-width: 680px; max-height: 90vh; overflow-y: auto; border-radius: 8px; position: relative; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .modal-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(to right,var(--gold),var(--teal)); border-radius:6px 6px 0 0; }
  .modal-title { font-family:'Lora',serif; font-size:16px; color:var(--cream); margin-bottom:14px; }
  .modal-close { position:absolute; top:12px; right:14px; background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .form-full { grid-column:1/-1; }
  .fl { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--cream-faint); margin-bottom:4px; }
  .fi { width:100%; background:rgba(0,0,0,0.25); border:1px solid rgba(201,168,76,0.18); color:var(--cream); padding:7px 10px; font-family:inherit; font-size:13px; border-radius:3px; outline:none; transition:border-color .2s; }
  .fi:focus { border-color:rgba(201,168,76,0.5); }
  .img-preview { width:100%; height:100px; object-fit:cover; border-radius:3px; margin-top:5px; display:none; }
  .add-btn { position:fixed; bottom:28px; right:28px; background:var(--gold); color:var(--ink); border:none; border-radius:50%; width:52px; height:52px; font-size:22px; cursor:pointer; box-shadow:0 4px 16px rgba(201,168,76,0.35); transition:background .2s; z-index:100; }
  .add-btn:hover { background:var(--goldl); }

  /* Environment accent */
  .creature-card { border-top: 2px solid transparent; }
  .env-forest  { border-top-color: #6B9E6E; }
  .env-ocean   { border-top-color: #5BBFD4; }
  .env-fantasy { border-top-color: #9B8AC4; }
  .env-holiday { border-top-color: #C9614A; }
  .env-space   { border-top-color: #4A7AA8; }

  /* Inactive dimming */
  .creature-card.inactive { opacity: .55; }
  .creature-card.inactive .card-img,
  .creature-card.inactive .card-img-placeholder { filter: grayscale(55%); }

  /* Image wrap + overlay badges */
  .card-img-wrap { position: relative; width: 100%; overflow: hidden; background: #2a241e; border-bottom: 1px solid var(--border); }
  .img-badge { position: absolute; top: 8px; left: 8px; padding: 3px 8px; border-radius: 30px; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; z-index: 2; }
  .img-badge.out { background: rgba(232, 112, 112, 0.15); color: #e87070; border: 1px solid rgba(232, 112, 112, 0.3); }
  .img-badge.low { background: rgba(201, 168, 76, 0.15); color: var(--goldl); border: 1px solid rgba(201, 168, 76, 0.3); }
  .img-log-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); color: var(--cream-faint); padding: 3px 8px; border-radius: 30px; font-size: 9px; backdrop-filter: blur(4px); z-index: 2; }
  .img-launch-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(91,191,212,0.15); color: #5BBFD4; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; backdrop-filter: blur(4px); border: 1px solid rgba(91,191,212,0.3); z-index: 2; transition: transform .3s ease; }
  .img-launch-badge.upright { transform: rotate(-45deg); }

  /* Filter bar */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-bar .fi { flex: 1; min-width: 150px; }
  .filter-count { font-size: 11px; color: var(--dim); white-space: nowrap; letter-spacing: .08em; }
  .active-tog { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--dim); cursor: pointer; padding: 8px 14px; border: 1px solid rgba(201,168,76,0.15); border-radius: 3px; user-select: none; white-space: nowrap; transition: all .2s; }
  .active-tog.on { color: #7dc994; border-color: rgba(125,201,148,0.4); background: rgba(125,201,148,0.06); }
  .active-tog .at-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
</style>
</head>
<body>
<div id="login-screen" style="display:none"></div>
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <svg width="22" height="17" viewBox="0 -2 76 52" fill="none" style="filter:drop-shadow(0 0 5px rgba(201,168,76,.35))"><path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/><rect x="4" y="42" width="64" height="3" rx="1.5" fill="#C9A84C"/><circle cx="36" cy="4" r="5.5" fill="#E8D08A"/><circle cx="6" cy="18" r="4" fill="#5BBFD4"/><circle cx="66" cy="18" r="4" fill="#5BBFD4"/></svg>
      <div><div class="topbar-name">Cadence Creatures</div><div class="topbar-sub">Back Office</div></div>
    </div>
    <div class="topbar-right"><div id="user-greet"></div><a class="topbar-link" onclick="signOut()">Sign Out</a></div>
  </div>
  <div class="dash-nav"></div>
  <div class="main">
    <div class="main-content">
      <div class="header">
        <div class="title">Creature Editor</div>
        <div class="subtitle">Manage all creatures — toggles, stock, images, and listings.</div>
      </div>
      <div class="filter-bar">
        <input class="fi" id="f-search" type="text" placeholder="Search by name…" oninput="filterRender()"/>
        <select class="fi" id="f-env-filter" onchange="filterRender()">
          <option value="">All environments</option>
          <option value="forest">Forest</option>
          <option value="ocean">Ocean</option>
          <option value="fantasy">Fantasy</option>
          <option value="holiday">Holiday</option>
          <option value="space">Space</option>
        </select>
        <div class="active-tog" id="active-tog" onclick="toggleActiveFilter()"><span class="at-dot"></span>Active only</div>
        <div class="filter-count" id="filter-count"></div>
      </div>
      <div class="editor-grid" id="creature-grid">
        <div style="color:var(--dim);font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:40px;grid-column:1/-1;text-align:center;">Loading creatures…</div>
      </div>
    </div>
  </div>
</div>

<!-- Edit / Add Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modal-title">Add Creature</div>
    <input type="hidden" id="edit-id"/>
    <div class="form-grid">
      <div><label class="fl">Name</label><input class="fi" id="f-name" placeholder="S'mores"/></div>
      <div><label class="fl">Species</label><input class="fi" id="f-species" placeholder="Gecko"/></div>
      <div class="form-full">
        <label class="fl">SKU<span class="help-tip">?<span class="tip-text">Auto-generated from Species + Name. Format: SPE-NAM with no keychain, or SPE-NAM-KCH with a keychain variant.</span></span></label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input class="fi" id="f-sku" placeholder="GEC-SMO" maxlength="11" style="flex:1;text-transform:uppercase;font-family:monospace;letter-spacing:.08em;"/>
          <button type="button" class="btn" onclick="genSKU()" style="white-space:nowrap;padding:7px 14px;font-size:11px;flex-shrink:0;">↺ Generate</button>
        </div>
        <div style="margin-top:6px;display:flex;align-items:center;gap:10px;">
          <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);cursor:pointer;user-select:none;">
            <input type="checkbox" id="f-has-kch" onchange="toggleKch()"/> Has keychain variant
          </label>
          <input class="fi" id="f-kch-suffix" placeholder="KCH" maxlength="3" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'');genSKU()" style="width:58px;text-transform:uppercase;font-family:monospace;letter-spacing:.08em;display:none;padding:5px 8px;"/>
        </div>
      </div>
      <div><label class="fl">Log #<span class="help-tip">?<span class="tip-text">Sequential creature number starting at 1. Shows as #001 on the card badge and on the creature's log page.</span></span></label><input class="fi" type="number" id="f-log" placeholder="1"/></div>
      <div><label class="fl">Environment<span class="help-tip">?<span class="tip-text">Sets the card accent color and habitat filter on the site. Forest = green, Ocean = teal, Fantasy = purple, Holiday = red, Space = blue.</span></span></label>
        <select class="fi" id="f-env">
          <option value="forest">Forest</option><option value="ocean">Ocean</option>
          <option value="fantasy">Fantasy</option><option value="holiday">Holiday</option>
          <option value="space">Space</option>
        </select>
      </div>
      <div class="form-full" style="background:rgba(255,255,255,0.02);border:1px solid rgba(201,168,76,0.1);padding:16px;border-radius:4px;margin-bottom:12px;">
        <label class="fl" style="margin-bottom:12px;display:block;">Print Recipe / Filament Mapping</label>
        <div id="recipe-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        <button type="button" class="btn sm" onclick="addRecipeRow()" style="margin-top:12px;background:rgba(201,168,76,0.05);">+ Add Color / Part</button>
        <input type="hidden" id="f-filament-color"/> <!-- Keep for legacy display string -->
      </div>
      <div><label class="fl">Retail Price ($)<span class="help-tip">?<span class="tip-text">What you charge for direct sales — website, in-person, events. Set before any platform fees.</span></span></label><input class="fi" type="number" id="f-price-retail" placeholder="18.00" step="0.01"/></div>
      <div><label class="fl">Etsy Price ($)<span class="help-tip">?<span class="tip-text">Listing price on Etsy. Set ~8–10% higher than retail to cover Etsy's 6.5% transaction fee plus listing fees.</span></span></label><input class="fi" type="number" id="f-price-etsy" placeholder="18.00" step="0.01"/></div>
      <div><label class="fl">Stock On Hand<span class="help-tip">?<span class="tip-text">How many finished, ready-to-ship copies exist right now. Drives the Out / Low badges on the creature grid.</span></span></label><input class="fi" type="number" id="f-qty" placeholder="0"/></div>
      <div class="form-full"><label class="fl">Tagline<span class="help-tip">?<span class="tip-text">1–2 sentences of flavor text shown under the creature's name on the site. Keep it evocative and in-universe.</span></span></label><input class="fi" id="f-tagline" placeholder="Found wandering the forest floor…"/></div>
      <div style="display:none">
        <input type="checkbox" id="f-featured"/>
        <input type="checkbox" id="f-launch-queue"/>
        <select id="f-active"><option value="true">Active</option><option value="false">Inactive</option></select>
      </div>
      <div class="form-full">
        <label class="fl">Etsy Listing URL<span class="help-tip">?<span class="tip-text">Full URL to this creature's Etsy listing page. Used for the Etsy button on the site and the bestiary.</span></span></label>
        <input class="fi" id="f-etsy-url" placeholder="https://etsy.com/listing/…"/>
      </div>
      <div class="form-full">
        <label class="fl">Image URL <span style="font-size:9px;color:var(--cream-faint);text-transform:none;letter-spacing:0">Paste a link or upload a photo</span></label>
        <div style="display:flex;gap:6px;">
          <input class="fi" id="f-image-url" placeholder="https://… or /images/…" oninput="previewImg()" style="flex:1;"/>
          <label class="btn" style="cursor:pointer;margin:0;padding:9px 14px;font-size:11px;display:flex;align-items:center;gap:5px;white-space:nowrap;">
            <span id="upload-lbl">Upload</span>
            <input type="file" accept="image/*" style="display:none;" onchange="uploadImage(event)"/>
          </label>
        </div>
        <img id="img-preview" class="img-preview" alt="preview"/>
      </div>
      <div class="form-full">
        <label class="fl">3D Model (GLB) <span style="font-size:9px;color:var(--cream-faint);text-transform:none;letter-spacing:0">Upload a .glb file — powers the ⬡ 3D viewer on the Bestiary</span></label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input class="fi" id="f-model-url" placeholder="https://… or upload below" style="flex:1;font-size:11px;"/>
          <label class="btn" style="cursor:pointer;margin:0;padding:9px 14px;font-size:11px;display:flex;align-items:center;gap:5px;white-space:nowrap;">
            <span id="model-upload-lbl">Upload GLB</span>
            <input type="file" accept=".glb,.gltf" style="display:none;" onchange="uploadModel(event)"/>
          </label>
        </div>
        <div id="model-preview-row" style="display:none;margin-top:6px;font-size:10px;color:var(--cream-faint);display:flex;align-items:center;gap:8px;">
          <span style="color:#7dc994;">✓ Model linked</span>
          <a id="model-preview-link" href="#" target="_blank" rel="noopener" style="color:var(--gold-light);font-size:10px;">Preview ↗</a>
        </div>
      </div>
      <div class="form-full"><label class="fl">Notes</label><textarea class="fi" id="f-notes" style="min-height:52px;resize:vertical;" placeholder="Internal notes…"></textarea></div>

      <div class="form-full" style="border-top:1px solid rgba(201,168,76,.1);padding-top:16px;margin-top:4px;">
        <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.4);margin-bottom:14px;">Field Notes / Lore Page</div>
        <div class="fr" style="margin-bottom:12px;">
          <div><label class="fl">Discovery Location</label><input class="fi" id="f-lore-location" placeholder="Sun Rock, Visalia, CA"/></div>
          <div><label class="fl">Entry Date</label><input class="fi" id="f-lore-date" placeholder="Early Spring, 2026"/></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div><label class="fl">Story — Paragraph 1</label><textarea class="fi" id="f-lore-p1" style="min-height:64px;resize:vertical;" placeholder="Opening paragraph…"></textarea></div>
          <div><label class="fl">Paragraph 2</label><textarea class="fi" id="f-lore-p2" style="min-height:64px;resize:vertical;"></textarea></div>
          <div><label class="fl">Paragraph 3</label><textarea class="fi" id="f-lore-p3" style="min-height:64px;resize:vertical;"></textarea></div>
          <div><label class="fl">Field Observations <span style="font-size:9px;text-transform:none;letter-spacing:0;color:var(--cream-faint);">— one per line</span></label><textarea class="fi" id="f-lore-obs" style="min-height:80px;resize:vertical;" placeholder="thrives in warm spots of afternoon light&#10;will sit perfectly still for hours"></textarea></div>
          <div style="font-size:10px;color:var(--cream-faint);display:flex;align-items:center;gap:10px;">NFC / Lore URL: <a id="lore-url-preview" href="#" target="_blank" rel="noopener" style="font-family:monospace;color:rgba(201,168,76,.6);text-decoration:none;">—</a><button id="lore-copy-btn" onclick="copyLoreUrl()" style="display:none;font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold);padding:3px 8px;cursor:pointer;border-radius:2px;" title="Copy for NFC chip">Copy</button></div>
        </div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;">
      <button class="btn pri" onclick="saveCreature()">Save Creature</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn red" id="del-btn" style="display:none;margin-left:auto;" onclick="deleteCreature()">Delete</button>
    </div>
  </div>
</div>

<button class="add-btn" onclick="openModal()" title="Add new creature">+</button>
<div id="tst" class="toast"></div>

<script>
  let creatures = [];
  let inv = [];

  function colorFromName(name){
    const n=(name||'').toLowerCase();
    if(n.includes('black'))return'#222';
    if(n.includes('white'))return'#f0f0f0';
    if(n.includes('red')||n.includes('scarlet'))return'#c44';
    if(n.includes('blue'))return'#4477cc';
    if(n.includes('green')||n.includes('forest')||n.includes('olive'))return'#4a8c5c';
    if(n.includes('yellow')||n.includes('gold'))return'#C9A84C';
    if(n.includes('orange')||n.includes('amber'))return'#c97c2a';
    if(n.includes('purple')||n.includes('violet'))return'#7766cc';
    if(n.includes('pink')||n.includes('rose'))return'#cc6688';
    if(n.includes('teal')||n.includes('cyan'))return'#5BBFD4';
    if(n.includes('brown')||n.includes('tan'))return'#8B6347';
    if(n.includes('grey')||n.includes('gray'))return'#888';
    if(n.includes('crystal'))return'#aee0f0';
    if(n.includes('glow')||n.includes('lumin'))return'#aaee66';
    return'#7a6f62';
  }

  function addRecipeRow(data = {}) {
    const cont = document.getElementById('recipe-list');
    if(!cont) return;
    const div = document.createElement('div');
    div.className = 'recipe-row';
    div.style = 'display:grid;grid-template-columns:110px 1fr 32px;gap:8px;align-items:center;';
    div.innerHTML = `
      <input class="fi" placeholder="e.g. Body" value="${esc(data.label || '')}" style="padding:6px 8px;"/>
      <select class="fi" style="padding:6px 8px;">
        <option value="">-- Select Spool --</option>
        ${inv.map(s => `<option value="${esc(s.id)}" ${s.id === data.filId ? 'selected' : ''}>${esc(s.spool_name)} (${esc(s.brand || 'No Brand')})</option>`).join('')}
      </select>
      <button type="button" class="btn sm" onclick="this.parentElement.remove()" style="padding:0;color:var(--red);border-color:transparent;background:transparent;font-size:16px;">×</button>
    `;
    cont.appendChild(div);
  }

  function showApp() { document.getElementById('app').style.display = 'flex'; init(); }

  async function init() {
    sync(true);
    const [cRes, iRes] = await Promise.all([
      db.from('creatures').select('*').order('log_number'),
      db.from('inventory').select('id, spool_name, color, purchase_url, brand')
    ]);
    if (cRes.error || iRes.error) { serr(); return; }
    creatures = cRes.data || [];
    inv = iRes.data || [];
    sync(false);
    filterRender();
  }

  let _activeOnly = false;

  function filterRender() {
    const search = document.getElementById('f-search').value.trim().toLowerCase();
    const env = document.getElementById('f-env-filter').value;
    let list = creatures;
    if (search) list = list.filter(c => (c.name || '').toLowerCase().includes(search));
    if (env) list = list.filter(c => c.environment === env);
    if (_activeOnly) list = list.filter(c => c.active !== false);
    const cnt = document.getElementById('filter-count');
    cnt.textContent = (list.length < creatures.length) ? `${list.length} of ${creatures.length} shown` : '';
    render(list);
  }

  function toggleActiveFilter() {
    _activeOnly = !_activeOnly;
    document.getElementById('active-tog').classList.toggle('on', _activeOnly);
    filterRender();
  }

  function render(list) {
    list = list || creatures;
    const grid = document.getElementById('creature-grid');
    if (!list.length) {
      grid.innerHTML = '<div style="color:var(--dim);font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:40px;grid-column:1/-1;text-align:center;">'
        + (creatures.length ? 'No creatures match these filters.' : 'No creatures yet — add one below.') + '</div>';
      return;
    }
    grid.innerHTML = list.map(c => {
      const stock = c.qty_on_hand ?? c.inventory_count ?? 0;
      const logStr = c.log_number ? `Log #${String(c.log_number).padStart(3,'0')}` : 'No Log';
      const envClass = c.environment ? `env-${c.environment}` : '';
      const inactiveClass = c.active === false ? 'inactive' : '';
      const logBadge = c.log_number ? `<div class="img-log-badge">#${String(c.log_number).padStart(3,'0')}</div>` : '';
      const launchBadge = c.in_launch_queue ? `<div class="img-launch-badge ${!c.is_revealed ? 'upright' : ''}" title="In Launch Queue">🚀</div>` : '';
      const stockBadge = stock === 0
        ? '<div class="img-badge out">Out</div>'
        : stock <= 15 ? '<div class="img-badge low">Low</div>' : '';
      const imgInner = c.image_url
        ? `<img class="card-img" src="${esc(c.image_url)}" alt="${esc(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div class="card-img-placeholder" style="display:none">No Image</div>`
        : `<div class="card-img-placeholder">No Image Yet</div>`;
      return `
        <div class="creature-card ${envClass} ${inactiveClass}">
          <div class="card-img-wrap">${imgInner}${logBadge}${launchBadge}${stockBadge}</div>
          <div class="card-body">
            <div class="card-name">${esc(c.name)}</div>
            <div class="card-meta">${logStr} · ${c.species || 'Creature'} · ${c.environment || '—'}</div>
            <div style="font-size:9px;color:var(--cream-faint);margin-bottom:12px;font-family:sans-serif;letter-spacing:0.02em;text-transform:none;">
              ${(()=>{
                if(!c.print_recipe) return '<div style="color:var(--gold-light);opacity:0.6;font-style:italic">No recipe set</div>';
                try {
                  const data = typeof c.print_recipe === 'string' ? JSON.parse(c.print_recipe) : c.print_recipe;
                  const recipe = Array.isArray(data) ? data : (data.recipe || []);
                  if(!recipe.length) return '<div style="color:var(--gold-light);opacity:0.6;font-style:italic">No recipe set</div>';
                  return recipe.map(r => {
                    const spool = inv.find(s => s.id === r.filId);
                    const name = spool ? spool.spool_name : (r.label || 'Unknown');
                    const color = spool ? colorFromName(spool.color) : colorFromName(r.label);
                    const buyLink = (spool && spool.purchase_url) ? `<a href="${spool.purchase_url}" target="_blank" style="text-decoration:none;margin-left:auto;font-size:12px;" title="Reorder">🛒</a>` : '';
                    return `<div style="display:flex;align-items:center;gap:6px;border-left:2px solid ${color};padding-left:8px;margin-top:4px;">
                      <span style="color:rgba(196,188,178,0.5);width:45px;flex-shrink:0;">${esc(r.label || 'Part')}:</span>
                      <span style="color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(name)}</span>
                      ${buyLink}
                    </div>`;
                  }).join('');
                } catch(e) { return ''; }
              })()}
            </div>
            </div>
            <div class="toggle-row">
              <div class="tog ${c.active !== false ? 'on green' : ''}" onclick="toggle('${c.id}','active',${!(c.active !== false)})"><span class="tog-dot"></span>Active</div>
              <div class="tog ${c.is_featured ? 'on' : ''}" onclick="toggle('${c.id}','is_featured',${!c.is_featured})"><span class="tog-dot"></span>Featured</div>
              <div class="tog ${c.in_launch_queue ? 'on blue' : ''}" onclick="toggle('${c.id}','in_launch_queue',${!c.in_launch_queue})"><span class="tog-dot"></span>Queue</div>
            </div>
            <div class="stock-row">
              <button class="btn sm" onclick="adjustStock('${c.id}',-1)">−</button>
              <div>
                <div class="stock-val" style="${stock === 0 ? 'color:#e87070' : stock <= 15 ? 'color:var(--goldl)' : ''}">${stock}</div>
                <div class="stock-lbl">In Stock</div>
              </div>
              <button class="btn sm" onclick="adjustStock('${c.id}',1)">+</button>
            </div>
            <div class="card-actions">
              <button class="btn sm" onclick="openModal('${c.id}')">Edit</button>
              ${c.etsy_url ? `<a class="btn sm" href="${esc(c.etsy_url)}" target="_blank" rel="noopener" style="text-decoration:none;">Etsy ↗</a>` : ''}
              ${(c.lore_story && c.lore_story.length) ? `<a class="btn sm" href="https://cadencecreatures.com/logs/creature.html?name=${encodeURIComponent(c.name)}" target="_blank" rel="noopener" style="text-decoration:none;color:var(--gold);">✦ Lore</a>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function toggle(id, field, val) {
    sync(true);
    const { error } = await db.from('creatures').update({ [field]: val }).eq('id', id);
    if (error) { serr(); toast('Failed', 'err'); return; }
    creatures = creatures.map(c => c.id === id ? { ...c, [field]: val } : c);
    const cName = (creatures.find(x => x.id === id) || {}).name || id;
    logActivity('Set ' + field, null, cName + ' → ' + val);
    sendDiscordAlert('⚡ Toggle: ' + field, `**${cName}** set to **${val}**`);
    sync(false);
    render();
  }

  async function adjustStock(id, delta) {
    const c = creatures.find(x => x.id === id);
    if (!c) return;
    const next = Math.max(0, (c.qty_on_hand ?? c.inventory_count ?? 0) + delta);
    sync(true);
    const { error } = await db.from('creatures').update({ qty_on_hand: next }).eq('id', id);
    if (error) { serr(); toast('Failed', 'err'); return; }
    creatures = creatures.map(x => x.id === id ? { ...x, qty_on_hand: next } : x);
    const cName = (creatures.find(x => x.id === id) || {}).name || id;
    logActivity('Adjust stock', null, cName + ': qty → ' + next);
    sendDiscordAlert('📦 Stock Update', `**${cName}** inventory adjusted to **${next}**`, next === 0 ? 0xE87070 : 0xC9A84C);
    sync(false);
    render();
  }

  function openModal(id) {
    const c = id ? creatures.find(x => x.id === id) : null;
    document.getElementById('modal-title').textContent = c ? `Edit — ${c.name}` : 'Add Creature';
    document.getElementById('edit-id').value = id || '';
    document.getElementById('del-btn').style.display = id ? 'block' : 'none';
    document.getElementById('f-name').value = c?.name || '';
    document.getElementById('f-species').value = c?.species || '';
    const skuParts = (c?.sku || '').split('-');
    document.getElementById('f-sku').value = c?.sku || '';
    const hasKch = skuParts.length === 3;
    document.getElementById('f-has-kch').checked = hasKch;
    document.getElementById('f-kch-suffix').style.display = hasKch ? 'inline-block' : 'none';
    document.getElementById('f-kch-suffix').value = hasKch ? skuParts[2] : '';
    document.getElementById('f-log').value = c?.log_number || '';
    document.getElementById('f-env').value = c?.environment || 'forest';
    
    // Populate Recipe Editor
    const recList = document.getElementById('recipe-list');
    recList.innerHTML = '';
    try {
      if(c?.print_recipe) {
        const data = typeof c.print_recipe === 'string' ? JSON.parse(c.print_recipe) : c.print_recipe;
        const recipe = Array.isArray(data) ? data : (data.recipe || []);
        recipe.forEach(r => addRecipeRow(r));
      } else if (c?.filament_color) {
        // Migration: convert old string to first recipe row
        addRecipeRow({ label: 'Body', filId: inv.find(s=>s.spool_name===c.filament_color)?.id });
      }
    } catch(e) { console.error('Recipe parse error:', e); }
    if(recList.children.length === 0) addRecipeRow({ label: 'Body' }); // Start with one row
    
    document.getElementById('f-price-retail').value = c?.price_retail || '';
    document.getElementById('f-price-etsy').value = c?.price_etsy || '';
    document.getElementById('f-qty').value = c?.qty_on_hand ?? c?.inventory_count ?? 0;
    document.getElementById('f-active').value = String(c?.active !== false);
    document.getElementById('f-tagline').value = c?.tagline || '';
    document.getElementById('f-etsy-url').value = c?.etsy_url || '';
    document.getElementById('f-image-url').value = c?.image_url || '';
    const modelUrl = c?.model_url || '';
    document.getElementById('f-model-url').value = modelUrl;
    const mpr = document.getElementById('model-preview-row');
    const mpl = document.getElementById('model-preview-link');
    if (modelUrl) { mpr.style.display = 'flex'; mpl.href = modelUrl; } else { mpr.style.display = 'none'; }
    document.getElementById('f-notes').value = c?.notes || '';
    document.getElementById('f-featured').checked = !!c?.is_featured;
    document.getElementById('f-launch-queue').checked = !!c?.in_launch_queue;
    var story = Array.isArray(c?.lore_story) ? c.lore_story : [];
    document.getElementById('f-lore-location').value = c?.lore_location || '';
    document.getElementById('f-lore-date').value = c?.lore_entry_date || '';
    document.getElementById('f-lore-p1').value = story[0] || '';
    document.getElementById('f-lore-p2').value = story[1] || '';
    document.getElementById('f-lore-p3').value = story[2] || '';
    var obs = Array.isArray(c?.lore_observations) ? c.lore_observations : [];
    document.getElementById('f-lore-obs').value = obs.join('\n');
    var loreName = c?.name || '';
    var loreEl = document.getElementById('lore-url-preview');
    var loreCopyBtn = document.getElementById('lore-copy-btn');
    if (loreName) {
      var loreHref = 'https://cadencecreatures.com/logs/creature.html?name=' + encodeURIComponent(loreName);
      loreEl.textContent = 'cadencecreatures.com/logs/creature.html?name=' + encodeURIComponent(loreName);
      loreEl.href = loreHref;
      loreCopyBtn.style.display = 'inline-block';
      loreCopyBtn.dataset.url = loreHref;
    } else {
      loreEl.textContent = '—';
      loreEl.href = '#';
      loreCopyBtn.style.display = 'none';
    }
    previewImg();
    document.getElementById('modal-bg').classList.add('open');
  }

  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

  function copyLoreUrl() {
    var url = document.getElementById('lore-copy-btn').dataset.url;
    if (!url) return;
    navigator.clipboard.writeText(url).then(function() {
      var btn = document.getElementById('lore-copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
    });
  }

  function previewImg() {
    const url = document.getElementById('f-image-url').value.trim();
    const img = document.getElementById('img-preview');
    if (url) { img.src = url; img.style.display = 'block'; }
    else img.style.display = 'none';
  }

  async function saveCreature() {
    const id = document.getElementById('edit-id').value;
    const payload = {
      name: document.getElementById('f-name').value.trim(),
      species: document.getElementById('f-species').value.trim(),
      sku: document.getElementById('f-sku').value.trim().toUpperCase() || null,
      log_number: parseInt(document.getElementById('f-log').value) || null,
      environment: document.getElementById('f-env').value,
      price_retail: parseFloat(document.getElementById('f-price-retail').value) || null,
      price_etsy: parseFloat(document.getElementById('f-price-etsy').value) || null,
      qty_on_hand: parseInt(document.getElementById('f-qty').value) || 0,
      active: document.getElementById('f-active').value === 'true',
      tagline: document.getElementById('f-tagline').value.trim(),
      etsy_url: document.getElementById('f-etsy-url').value.trim(),
      image_url: document.getElementById('f-image-url').value.trim(),
      model_url: document.getElementById('f-model-url').value.trim() || null,
      notes: document.getElementById('f-notes').value.trim(),
      is_featured: document.getElementById('f-featured').checked,
      in_launch_queue: document.getElementById('f-launch-queue').checked,
      lore_location: document.getElementById('f-lore-location').value.trim() || null,
      lore_entry_date: document.getElementById('f-lore-date').value.trim() || null,
      lore_story: [
        document.getElementById('f-lore-p1').value.trim(),
        document.getElementById('f-lore-p2').value.trim(),
        document.getElementById('f-lore-p3').value.trim()
      ].filter(Boolean),
      lore_observations: document.getElementById('f-lore-obs').value
        .split('\n').map(function(s){ return s.trim(); }).filter(Boolean),
    };

    // Gather Recipe
    const rows = document.querySelectorAll('.recipe-row');
    const recipe = [];
    rows.forEach(r => {
      const label = r.querySelector('input').value.trim();
      const filId = r.querySelector('select').value;
      if(label || filId) recipe.push({ label, filId });
    });
    
    // Preserve batch and pkg if they already exist in the creature's recipe
    const oldRecipe = creatures.find(c => c.id === id)?.print_recipe;
    let batch = 1, pkg = 0.75;
    if(oldRecipe) {
      try {
        const data = typeof oldRecipe === 'string' ? JSON.parse(oldRecipe) : oldRecipe;
        if(data.batch) batch = data.batch;
        if(data.pkg) pkg = data.pkg;
      } catch(e) {}
    }
    payload.print_recipe = JSON.stringify({ batch, pkg, recipe });
    
    // Legacy support: set filament_color to the first spool name
    if(recipe.length > 0) {
      const spool = inv.find(s => s.id === recipe[0].filId);
      if(spool) payload.filament_color = spool.spool_name;
    }

    if (!payload.name) { toast('Name is required', 'err'); return; }
    sync(true);
    
    // Auto-hide new creatures to prevent spoilers
    if (!id) {
      payload.is_revealed = false;
      payload.reveal_date = null;
    }

    const { error } = id
      ? await db.from('creatures').update(payload).eq('id', id)
      : await db.from('creatures').insert([payload]);
    if (error) { serr(); toast('Save failed', 'err'); return; }
    toast(id ? 'Saved' : 'Creature added');
    logActivity(id ? 'Edit creature' : 'Add creature', null, payload.name);
    sendDiscordAlert(id ? '✏️ Creature Updated' : '✨ New Discovery', `**${payload.name}** has been ${id ? 'updated' : 'added to the workshop log'}.`);
    closeModal();
    await init();
  }

  async function deleteCreature() {
    const id = document.getElementById('edit-id').value;
    if (!id || !confirm('Delete this creature? This cannot be undone.')) return;
    const delC = creatures.find(x => x.id === id);
    sync(true);
    const { error } = await db.from('creatures').delete().eq('id', id);
    if (error) { serr(); toast('Delete failed', 'err'); return; }
    logActivity('Delete creature', null, delC ? delC.name : id);
    sendDiscordAlert('🗑️ Creature Deleted', `**${delC ? delC.name : id}** has been removed from the log.`);
    toast('Deleted');
    closeModal();
    await init();
  }

  function skuSegment(str) {
    return (str || '').toUpperCase().replace(/[^A-Z]/g, '').substring(0, 3).padEnd(3, 'X');
  }

  function genSKU() {
    const species = skuSegment(document.getElementById('f-species').value);
    const name    = skuSegment(document.getElementById('f-name').value);
    if (species === 'XXX' && name === 'XXX') return;
    let sku = species + '-' + name;
    if (document.getElementById('f-has-kch').checked) {
      const kch = skuSegment(document.getElementById('f-kch-suffix').value);
      sku += '-' + kch;
    }
    document.getElementById('f-sku').value = sku;
  }

  function toggleKch() {
    const on = document.getElementById('f-has-kch').checked;
    document.getElementById('f-kch-suffix').style.display = on ? 'inline-block' : 'none';
    genSKU();
  }

  async function uploadImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const lbl = document.getElementById('upload-lbl');
    lbl.textContent = 'Uploading…';
    try {
      const ext = file.name.split('.').pop();
      const fileName = 'creature_' + Date.now() + '.' + ext;
      const { error } = await db.storage.from('creature-images').upload(fileName, file);
      if (error) throw error;
      const { data } = db.storage.from('creature-images').getPublicUrl(fileName);
      if (data?.publicUrl) {
        document.getElementById('f-image-url').value = data.publicUrl;
        previewImg();
        const cName = document.getElementById('f-name').value.trim();
        logActivity('Upload creature image', null, cName || 'unknown creature');
        toast('Image uploaded');
      }
    } catch(err) {
      console.error(err);
      toast('Upload failed — check the creature-images bucket in Supabase.', 'err');
    } finally {
      lbl.textContent = 'Upload';
      e.target.value = '';
    }
  }

  async function uploadModel(e) {
    const file = e.target.files[0];
    if (!file) return;
    const lbl = document.getElementById('model-upload-lbl');
    lbl.textContent = 'Uploading…';
    try {
      const ext = file.name.split('.').pop().toLowerCase();
      const fileName = 'creature_' + Date.now() + '.' + ext;
      const { error } = await db.storage.from('creature-models').upload(fileName, file);
      if (error) throw error;
      const { data } = db.storage.from('creature-models').getPublicUrl(fileName);
      if (data?.publicUrl) {
        document.getElementById('f-model-url').value = data.publicUrl;
        const mpr = document.getElementById('model-preview-row');
        const mpl = document.getElementById('model-preview-link');
        mpr.style.display = 'flex';
        mpl.href = data.publicUrl;
        toast('Model uploaded — save the creature to publish it');
      }
    } catch(err) {
      console.error(err);
      toast('Upload failed — check the creature-models bucket in Supabase.', 'err');
    } finally {
      lbl.textContent = 'Upload GLB';
      e.target.value = '';
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
</script>
</body>
</html>
