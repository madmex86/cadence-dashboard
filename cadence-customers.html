<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="icon" href="/favicon.ico?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
  /* Customer Directory Luxury Styling */
  .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(201, 168, 76, 0.12); padding: 24px; border-radius: 8px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: var(--gold); opacity: 0.5; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold-light); margin-bottom: 8px; opacity: 0.8; }
  .stat-value { font-family: var(--fc); font-size: 32px; color: var(--cream); }

  .search-wrap { position: relative; margin-bottom: 32px; max-width: 500px; }
  .search-bar { background: rgba(28, 22, 18, 0.6); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 4px; padding: 14px 16px 14px 44px; color: var(--cream); font-family: inherit; width: 100%; outline: none; transition: all 0.3s; backdrop-filter: blur(8px); }
  .search-bar:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(201, 168, 76, 0.1); }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--gold); opacity: 0.6; pointer-events: none; }

  .customer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .customer-card { background: rgba(20, 18, 15, 0.8); border: 1px solid rgba(201, 168, 76, 0.1); border-radius: 6px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: default; }
  .customer-card:hover { border-color: rgba(201, 168, 76, 0.3); transform: translateY(-2px); background: rgba(255, 255, 255, 0.03); }
  
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, rgba(201, 168, 76, 0.2), rgba(0,0,0,0.4)); border: 1px solid rgba(201, 168, 76, 0.3); display: flex; align-items: center; justify-content: center; font-family: var(--fc); color: var(--gold-light); font-size: 18px; flex-shrink: 0; }
  
  .cust-info { flex: 1; min-width: 0; }
  .cust-name { font-family: var(--fc); font-size: 17px; color: var(--cream); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cust-email { font-size: 12px; color: var(--cream-faint); margin-bottom: 6px; }
  .cust-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); opacity: 0.6; }
  
  .cust-date { font-size: 9px; color: rgba(196,188,178,0.3); text-align: right; }

  @media (max-width: 768px) {
    .customer-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:none"></div>

<div id="app" style="display:none">
<div class="topbar">
  <div class="topbar-left">
    <svg width="22" height="17" viewBox="0 -2 76 52" fill="none" style="filter:drop-shadow(0 0 5px rgba(201,168,76,.35))"><path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/><rect x="4" y="42" width="64" height="3" rx="1.5" fill="#C9A84C"/><circle cx="36" cy="4" r="5.5" fill="#E8D08A"/><circle cx="6" cy="18" r="4" fill="#5BBFD4"/><circle cx="66" cy="18" r="4" fill="#5BBFD4"/></svg>
    <div><div class="topbar-name">Cadence Creatures</div><div class="topbar-sub">Back Office</div></div>
  </div>
  <div class="topbar-right">
    <div id="user-greet"></div>
    <a class="topbar-link" onclick="signOut()">Sign Out</a>
  </div>
</div>

  <div class="dash-nav">
    <a href="index.html">Hub</a>
    <a href="cadence-queue.html">Queue</a>
    <a href="cadence-fulfillment.html">Fulfillment</a>
    <a href="cadence-customers.html" class="active">Customers</a>
    <a href="cadence-creature-editor.html">Creatures</a>
    <a href="cadence-email-blast.html">Email Blast</a>
    <a href="cadence-drop-launch.html">🚀 Launch</a>
    <a href="cadence-creatures-pl-tracker.html">P&amp;L</a>
    <a href="cadence-activity.html">Activity</a>
    <a href="cadence-admin.html">Admin</a>
    <a href="cadence-site.html">Site</a>
    <a href="https://cadencecreatures.com" target="_blank">Live Site ↗</a>
    <a href="https://etsy.com/shop/CadenceCreatures" target="_blank">Etsy Shop ↗</a>
  </div>

<div class="main">
  <div class="header">
    <div class="title">Customer Directory</div>
    <div class="subtitle">Personal records and subscription tracking for the Cadence community.</div>
  </div>

  <div class="stats-strip">
    <div class="stat-card">
      <div class="stat-label">Total Subscribers</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">New This Month</div>
      <div class="stat-value" id="stat-month">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Waitlist</div>
      <div class="stat-value" id="stat-waitlist">0</div>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" class="search-bar" id="cust-search" placeholder="Search by name, email, or source..." oninput="filterCustomers()"/>
  </div>
  
  <div class="customer-grid" id="customer-list">
    <!-- Customers loaded here -->
  </div>
</div>

<div class="toast" id="tst"></div>

<script>
let allCustomers = [];

async function showApp() {
  document.getElementById('app').style.display = 'block';
  loadCustomers();
}

async function loadCustomers() {
  const { data, error } = await db.from('subscribers').select('*').order('created_at', { ascending: false });
  if(error) return toast('Error loading customers', 'err');
  allCustomers = data || [];
  
  updateStats();
  renderCustomers(allCustomers);
}

function updateStats() {
  document.getElementById('stat-total').textContent = allCustomers.length;
  
  const now = new Date();
  const thisMo = allCustomers.filter(c => {
    const d = new Date(c.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('stat-month').textContent = thisMo;
  
  const waitlist = allCustomers.filter(c => c.source === 'landing_page').length;
  document.getElementById('stat-waitlist').textContent = waitlist;
}

function renderCustomers(list) {
  const container = document.getElementById('customer-list');
  if(!list.length) {
    container.innerHTML = '<div class="subtitle" style="grid-column:1/-1; text-align:center; padding:40px;">No customers found.</div>';
    return;
  }
  
  container.innerHTML = list.map(c => {
    const initial = (c.first_name || c.email).charAt(0).toUpperCase();
    const fullName = (c.first_name || c.last_name) ? `${c.first_name || ''} ${c.last_name || ''}` : 'Mystery Creature';
    
    return `
      <div class="customer-card">
        <div class="avatar">${initial}</div>
        <div class="cust-info">
          <div class="cust-name">${fullName}</div>
          <div class="cust-email">${c.email}</div>
          <div class="cust-tag">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7.01"></line></svg>
            ${c.source === 'landing_page' ? 'Landing Page' : (c.source || 'Direct')}
          </div>
        </div>
        <div class="cust-date">
          ${new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
        </div>
      </div>
    `;
  }).join('');
}

function filterCustomers() {
  const term = document.getElementById('cust-search').value.toLowerCase();
  const filtered = allCustomers.filter(c => 
    c.email.toLowerCase().includes(term) || 
    (c.first_name || '').toLowerCase().includes(term) || 
    (c.last_name || '').toLowerCase().includes(term) ||
    (c.source || '').toLowerCase().includes(term)
  );
  renderCustomers(filtered);
}
</script>
</body>
</html>
