<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence Forge | Activity Audit</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
  :root {
    --bg: #0a0f1e;
    --panel-bg: #11192d;
    --border: rgba(201, 168, 76, 0.15);
    --gold: #C9A84C;
    --gold-light: #E8D08A;
    --cream: #f4eee0;
    --cream-dim: #c5bba8;
    --cream-faint: rgba(197, 187, 168, 0.5);
    --cyan: #5BBFD4;
  }

  body { margin: 0; padding: 0; background: var(--bg); color: var(--cream); font-family: 'Lora', serif; overflow-x: hidden; }

  /* Fixed Sidebar Navigation */
  .dash-nav {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 240px; background: #0d1425;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 80px 0 20px 0; z-index: 50;
  }
  .dash-nav a { padding: 12px 28px; font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--cream-faint); text-decoration: none; transition: 0.2s; }
  .dash-nav a:hover { color: var(--gold-light); background: rgba(255,255,255,0.03); }

  /* Topbar */
  .topbar { 
    position: fixed; top: 0; right: 0; left: 0; height: 60px;
    background: rgba(13, 20, 37, 0.95); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 30px; border-bottom: 1px solid var(--border); z-index: 100;
  }

  /* Main Offset Content */
  #app { margin-left: 240px; }
  .content { padding: 100px 40px 40px 40px; max-width: 1200px; }

  /* Activity List Styling */
  .log-list { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .log-item { 
    padding: 16px 24px; 
    display: flex; align-items: center; justify-content: space-between; 
    border-bottom: 1px solid rgba(255,255,255,0.03); 
    transition: background 0.2s;
  }
  .log-item:hover { background: rgba(201, 168, 76, 0.03); }
  
  .log-main { display: flex; align-items: center; gap: 20px; flex: 1; }
  .log-user { 
    font-size: 9px; font-weight: 700; color: var(--cyan); 
    background: rgba(91, 191, 212, 0.1); 
    padding: 4px 10px; border-radius: 4px; 
    text-transform: uppercase; letter-spacing: 0.1em;
    border: 1px solid rgba(91, 191, 212, 0.2);
  }
  .log-action { font-size: 13px; color: var(--cream); }
  .log-time { font-size: 11px; color: var(--cream-faint); font-family: 'Lora', serif; }

  .empty { padding: 80px; text-align: center; color: var(--cream-faint); font-style: italic; }

  @media (max-width: 1024px) { .dash-nav { display: none; } #app { margin-left: 0; } }
</style>
</head>
<body>

<div id="login-screen" style="display:none;"></div>

<div id="app">
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <svg width="24" height="24" viewBox="0 0 76 52" fill="none"><path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" stroke="#C9A84C" stroke-width="3"/></svg>
      <div style="font-weight:bold; letter-spacing:0.1em; text-transform:uppercase;">System Audit</div>
    </div>
    <div id="user-greet" style="font-size:12px; color:var(--cream-dim)"></div>
  </div>

  <div class="dash-nav">
    <a href="index.html">Hub Dashboard</a>
    <a href="cadence-queue.html">Operational Queue</a>
    <a href="cadence-fulfillment.html">Fulfillment</a>
    <a href="cadence-creatures-pl-tracker.html">P&amp;L Analysis</a>
    <a href="cadence-activity.html" style="color:var(--gold)">System Activity</a>
    <a href="https://cadencecreatures.com" target="_blank">Live Site ↗</a>
  </div>

  <div class="content">
    <div style="margin-bottom: 30px;">
      <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 8px;">Audit Trail</p>
      <h1 style="margin: 0; font-size: 32px; font-weight: bold; tracking: -0.02em;">Activity History</h1>
    </div>

    <div id="log-container" class="log-list">
      <div class="empty">Scanning audit trail...</div>
    </div>
  </div>
</div>

<script>
async function showApp() {
  const role = currentUser.user_metadata?.role || 'user';
  const isOwner = currentUser.email === 'stevenportugal86@gmail.com';
  if(role !== 'admin' && !isOwner) {
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('app').style.display = 'block';
  loadLogs();
}

async function loadLogs() {
  const container = document.getElementById('log-container');
  const { data, error } = await db.from('activity_log').select('*').order('created_at', { ascending: false }).limit(100);
  
  if (error) {
    container.innerHTML = `<div class="empty" style="color:var(--red)">Failed to load logs: ${error.message}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty">No activity recorded yet.</div>';
    return;
  }

  container.innerHTML = data.map(log => {
    const d = new Date(log.created_at);
    const timeStr = d.toLocaleDateString() + ' — ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    return `
      <div class="log-item">
        <div class="log-main">
          <span class="log-user">${log.user_name || 'System'}</span>
          <span class="log-action">${log.action}</span>
        </div>
        <div class="log-time">${timeStr}</div>
      </div>
    `;
  }).join('');
}

setInterval(loadLogs, 30000);
</script>
</body>
</html>
