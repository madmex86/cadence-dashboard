<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadence Activity Feed</title>
<link rel="icon" href="/favicon.ico?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
  /* Activity Specifics */
  .main { padding: 40px 28px; max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  .log-list { display: flex; flex-direction: column; gap: 1px; background: rgba(201, 168, 76, 0.1); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .log-item { background: #1C1612; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; transition: background 0.2s; border-bottom: 1px solid rgba(201, 168, 76, 0.05); }
  .log-item:hover { background: rgba(255, 255, 255, 0.02); }
  .log-main { display: flex; align-items: center; gap: 18px; flex: 1; }
  .log-user { font-size: 10px; font-weight: 600; color: #C9A84C; background: rgba(201, 168, 76, 0.1); padding: 3px 10px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  .log-action { font-size: 13px; color: #FAF6F0; letter-spacing: 0.02em; }
  .log-time { font-size: 11px; color: #8A7D6E; white-space: nowrap; font-family: 'Lora', serif; }

  .empty { padding: 60px; text-align: center; color: #8A7D6E; font-style: italic; font-family: 'Lora', serif; }
</style>
</head>
<body>

<div id="login-screen" style="display:none;"></div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <svg width="22" height="17" viewBox="0 -2 76 52" fill="none" style="filter:drop-shadow(0 0 5px rgba(201,168,76,.35))">
        <path d="M6 44 L6 18 L22 32 L36 4 L50 32 L66 18 L66 44 Z" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/>
        <rect x="4" y="42" width="64" height="3" rx="1.5" fill="#C9A84C"/>
        <circle cx="36" cy="4" r="5.5" fill="#E8D08A"/>
        <circle cx="6" cy="18" r="4" fill="#5BBFD4"/>
        <circle cx="66" cy="18" r="4" fill="#5BBFD4"/>
      </svg>
      <div>
        <div class="topbar-name">Cadence Creatures</div>
        <div class="topbar-sub">Activity Feed</div>
      </div>
    </div>
    <div class="topbar-right">
      <div id="user-greet"></div>
      <a class="topbar-link" onclick="signOut()">Sign Out</a>
    </div>
  </div>

  <div class="dash-nav">
    <a href="index.html">Hub</a>
    <a href="cadence-queue.html">Queue</a>
    <a href="cadence-fulfillment.html">Fulfillment</a>
    <a href="cadence-customers.html">Customers</a>
    <a href="cadence-creatures-pl-tracker.html">P&amp;L</a>
    <a href="cadence-activity.html">Activity</a>
    <a href="cadence-admin.html">Admin</a>
    <a href="https://cadencecreatures.com" target="_blank">Live Site ↗</a>
    <a href="https://etsy.com/shop/CadenceCreatures" target="_blank">Etsy Shop ↗</a>
  </div>

  <div class="main">
    <div class="header">
      <h1 class="title">Activity History</h1>
      <p class="subtitle">A live record of all shop operations and personnel actions.</p>
    </div>

    <div id="log-container" class="log-list">
      <div class="empty">Loading audit trail...</div>
    </div>
  </div>
</div>

<script>
async function showApp() {
  const role = currentUser.user_metadata?.role || 'user';
  const isOwner = currentUser.email === 'stevenportugal86@gmail.com';
  if(role !== 'admin' && !isOwner) {
    window.location.href = 'index.html';
    return;
  }
  document.getElementById('app').style.display = 'block';
  loadLogs();
}

async function loadLogs() {
  const container = document.getElementById('log-container');
  const { data, error } = await db.from('activity_log').select('*').order('created_at', { ascending: false }).limit(100);
  
  if (error) {
    container.innerHTML = `<div class="empty" style="color:#e09090">Failed to load logs: ${error.message}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty">No activity recorded yet.</div>';
    return;
  }

  container.innerHTML = data.map(log => {
    const d = new Date(log.created_at);
    const timeStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    return `
      <div class="log-item">
        <div class="log-main">
          <span class="log-user">${log.user_name || 'System'}</span>
          <span class="log-action">${log.action}</span>
        </div>
        <div class="log-time">${timeStr}</div>
      </div>
    `;
  }).join('');
}

// Refresh logs every 30 seconds
setInterval(loadLogs, 30000);
</script>
</div>
</body>
</html>
